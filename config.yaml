stt:
  engine: groq_whisper
  model: whisper-large-v3
  speech_pause_threshold_seconds: 1

llm:
  # provider: openai
  # model: gpt-5.3
  # # To use ChatGPT subscription via Codex CLI instead:
  provider: codex_cli
  model: gpt-5.3-codex
  codex_path: codex  # path to codex binary if not on PATH

agent:
  min_seconds_between_interjections: 15

server:
  host: 127.0.0.1
  port: 8000

frontend:
  port: 5173

tts:
  enabled: true
  provider: elevenlabs
  voice_id: Rachel
  model_id: eleven_monolingual_v1
  model_path: models/piper/en_US-amy-medium.onnx
