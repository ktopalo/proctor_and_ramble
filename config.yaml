stt:
  engine: mlx_whisper
  model: mlx-community/whisper-large-v3-turbo
  speech_pause_threshold_seconds: 3

llm:
  # provider: openai
  # model: gpt-5.3
  # # To use ChatGPT subscription via Codex CLI instead:
  provider: codex_cli
  model: gpt-5.3-codex
  codex_path: codex  # path to codex binary if not on PATH

agent:
  min_seconds_between_interjections: 5
  context_transcript_chunks: 50
  context_recent_deltas: 50

server:
  host: 127.0.0.1
  port: 8000

frontend:
  port: 5173
